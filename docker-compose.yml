services:
  # 인프라 파트 (Gateway)
  api-gateway:
    build: ./api_gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SEARCH_ENGINE_URL=http://search-engine:8002
      - REC_MODELS_URL=http://rec-models:8003
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - IMAGE_ROOT=/app/data/raw/images
      - ENABLE_RAW_TRANSACTION_PRICE_BACKFILL=0
    depends_on:
      - redis
    volumes:
      - ./data:/app/data  # 공용 데이터 폴더 공유

  # B 파트 (검색)
  search-engine:
    build: ./search_engine
    ports:
      - "8002:8002"
    environment:
      - SEARCH_ENGINE_MODE=dev
      - SEARCH_ENGINE_DEV_SAMPLE_SIZE=10000
      - SEARCH_ENGINE_DATA_ROOT=/app/data/processed
      - SEARCH_ENGINE_IMAGE_ROOT=/app/data/raw/images
    volumes:
      - ./data:/app/data
      - huggingface_cache:/root/.cache/huggingface

  # C 파트 (모델)
  rec-models:
    build: ./rec_models
    ports:
      - "8003:8003"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REC_DATA_MODE=dev
      - RANKING_CHECKPOINT_DIR=/app/data/checkpoints/logreg_dev
      - TWO_TOWER_CHECKPOINT_DIR=/app/data/checkpoints/candidate_dev_history_itemid_fast
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
      - huggingface_cache:/root/.cache/huggingface

  # 공용 DB
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  # 프론트엔드
  frontend:
    build: ./pront
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

  # 평가 대시보드
  dashboard:
    build: ./evaluation
    ports:
      - "8501:8501"
    environment:
      - REPORTS_ROOT=/rec_models/reports
      - SEARCH_REPORT_PATH=/app/search_metrics_report.json
      - API_GATEWAY_URL=http://api-gateway:8000
    volumes:
      - ./rec_models/reports:/rec_models/reports:ro
      - ./evaluation/search_metrics_report.json:/app/search_metrics_report.json:ro
    depends_on:
      - api-gateway

  # CT 파이프라인
  ct-pipeline:
    build: ./ct_pipeline
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    volumes:
      - ./rec_models/reports:/rec_models/reports:ro

  # 시뮬레이터
  simulator:
    build: ./simulator
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_GATEWAY_URL=http://api-gateway:8000
    depends_on:
      - redis
      - api-gateway

volumes:
  huggingface_cache:
